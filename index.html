<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aigfox Originals - Client Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
            color: #1a202c;
            -webkit-tap-highlight-color: transparent;
        }

        .app-container {
            max-width: 414px;
            height: 100vh;
            max-height: 896px;
            margin: 0 auto;
            background-color: #ffffff;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        @media (min-width: 450px) {
            .app-container {
                height: 90vh;
                margin-top: 5vh;
                border-radius: 40px;
                border: 8px solid #f1f5f9;
            }
        }

        .scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            padding-bottom: 40px;
        }
        
        .scroll-area::-webkit-scrollbar { display: none; }
        .scroll-area { -ms-overflow-style: none; scrollbar-width: none; }

        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01); }
        .gradient-card { background: linear-gradient(135deg, #1f2937 0%, #000000 100%); color: white; }

        .circular-chart { display: block; margin: 0 auto; max-width: 80%; max-height: 250px; }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.1); stroke-width: 2.5; }
        .circle { fill: none; stroke-width: 2.5; stroke-linecap: round; transition: stroke-dasharray 1s ease-out; }
        
        .timeline-item { position: relative; z-index: 1; }

        .modal-backdrop { backdrop-filter: blur(4px); }
        
        .fab {
            position: absolute; bottom: 30px; right: 24px; width: 56px; height: 56px;
            background-color: #000000; color: white; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3); cursor: pointer; z-index: 40;
            transition: transform 0.2s; font-size: 24px;
        }
        .fab:hover { transform: scale(1.05); }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 12px; background: #000; color: white;
            font-size: 14px; z-index: 100; transition: opacity 0.3s; pointer-events: none;
            opacity: 0;
            font-weight: 600;
        }

        /* Upgraded Deliverable Animations */
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .deliverable-item {
            animation: slideInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .deliverable-item:nth-child(1) { animation-delay: 0.1s; }
        .deliverable-item:nth-child(2) { animation-delay: 0.2s; }
        .deliverable-item:nth-child(3) { animation-delay: 0.3s; }
        .deliverable-item:nth-child(4) { animation-delay: 0.4s; }
        .deliverable-item:nth-child(5) { animation-delay: 0.5s; }
        
        .deliverable-item:hover {
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 12px 24px -8px rgba(249, 115, 22, 0.15);
            border-color: #ffedd5;
        }

        /* Enhanced Timeline Animations */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.6); transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { box-shadow: 0 0 0 12px rgba(249, 115, 22, 0); transform: scale(1); }
        }
        .active-dot { animation: pulse-ring 2s infinite; }

        @keyframes float-icon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .animate-float { animation: float-icon 3s ease-in-out infinite; display: inline-block; }
        
        @keyframes progress-beam {
            0% { background-position: 0 0; }
            100% { background-position: 0 28px; }
        }
        .timeline-line-active {
            background: repeating-linear-gradient(
                -45deg,
                #f97316,
                #f97316 10px,
                #fdba74 10px,
                #fdba74 20px
            );
            background-size: 100% 28px;
            animation: progress-beam 0.8s linear infinite;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.6);
        }
    </style>
</head>
<body>

    <div id="toast">Message</div>

    <div class="app-container" id="app-root">
        <div class="flex flex-col items-center justify-center h-full text-center p-8">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-black mb-4"></div>
            <p class="text-gray-500 text-sm">Initializing Secure Connection...</p>
        </div>
    </div>

    <!-- Generic Single Input Modal -->
    <div id="custom-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black bg-opacity-40 p-4 modal-backdrop">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 card-shadow transform transition-all scale-95 opacity-0" id="modal-content">
            <h3 class="text-lg font-bold text-gray-800 mb-2" id="modal-title">Edit Value</h3>
            <textarea id="modal-input-area" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-black transition-colors hidden" rows="4"></textarea>
            <input type="text" id="modal-input" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 mb-4 focus:outline-none focus:border-black transition-colors" />
            <div class="flex gap-3">
                <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-600 font-semibold py-3 rounded-xl hover:bg-gray-200 transition-colors">Cancel</button>
                <button onclick="saveModal()" class="flex-1 bg-black text-white font-semibold py-3 rounded-xl hover:bg-gray-800 transition-colors">Save</button>
            </div>
        </div>
    </div>

    <!-- Add Deliverable Link Modal -->
    <div id="deliverable-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black bg-opacity-40 p-4 modal-backdrop">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 card-shadow transform transition-all scale-95 opacity-0" id="deliverable-modal-content">
            <h3 class="text-lg font-bold text-gray-800 mb-4">Add New Deliverable</h3>
            <div class="space-y-3 mb-4">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">File Name</label>
                    <input type="text" id="deliv-name" placeholder="e.g. Final Video V2" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:border-black transition-colors" />
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Google Drive / Frame.io Link</label>
                    <input type="url" id="deliv-url" placeholder="https://..." class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:border-black transition-colors" />
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="closeDeliverableModal()" class="flex-1 bg-gray-100 text-gray-600 font-semibold py-3 rounded-xl hover:bg-gray-200 transition-colors">Cancel</button>
                <button onclick="saveDeliverable()" class="flex-1 bg-black text-white font-semibold py-3 rounded-xl hover:bg-gray-800 transition-colors">Add Link</button>
            </div>
        </div>
    </div>

    <!-- Admin Create Project Modal -->
    <div id="create-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black bg-opacity-40 p-4 modal-backdrop">
        <div class="bg-white rounded-3xl w-full max-w-sm p-6 card-shadow transform transition-all scale-95 opacity-0" id="create-modal-content">
            <h3 class="text-xl font-extrabold text-gray-800 mb-4">Create New Project</h3>
            <div class="space-y-3 mb-6">
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Client Username</label>
                    <input type="text" id="create-client" placeholder="e.g. miller" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:border-black transition-colors" />
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Campaign Name</label>
                    <input type="text" id="create-campaign" placeholder="e.g. Summer Promo 2026" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:border-black transition-colors" />
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-500 uppercase ml-1">Video Title</label>
                    <input type="text" id="create-video" placeholder="e.g. Main Commercial" class="w-full border-2 border-gray-100 rounded-xl px-4 py-3 focus:outline-none focus:border-black transition-colors" />
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="closeCreateModal()" class="flex-1 bg-gray-100 text-gray-600 font-semibold py-3 rounded-xl hover:bg-gray-200 transition-colors">Cancel</button>
                <button onclick="saveNewProject()" class="flex-1 bg-black text-white font-semibold py-3 rounded-xl hover:bg-gray-800 transition-colors">Create</button>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const SUPABASE_URL = "https://jtpsnufycomhozsiegjh.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0cHNudWZ5Y29taG96c2llZ2poIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE5OTI5NjAsImV4cCI6MjA3NzU2ODk2MH0.SsKcUAjkv4gsTKawOfN-KKzYRkUKoQZj-JZDo8liggc";
        
        const supabaseClientInstance = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- STATE MANAGEMENT ---
        let state = {
            role: null, 
            screen: 'login', 
            activeClientUsername: null,
            activeCampaignName: null,
            activeProjectId: null, 
            projects: [] 
        };

        let modalCallback = null;
        let isTextArea = false;

        // --- DATABASE LOGIC ---
        let realtimeChannel = null;

        window.forceRefresh = async () => {
            showToast("Refreshing...");
            await fetchProjects();
            showToast("Up to date! ✨");
        };

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.style.opacity = '1';
            setTimeout(() => t.style.opacity = '0', 2500);
        }
        
        async function fetchProjects() {
            try {
                if (!supabaseClientInstance) {
                    console.error("Supabase client not initialized");
                    return;
                }

                const { data, error } = await supabaseClientInstance
                    .from('projects')
                    .select('*')
                    .order('updatedAt', { ascending: false });

                if (error) {
                    console.error("Supabase Query Error:", error);
                    showToast("DB Error: " + error.message); 
                    return; 
                }
                
                state.projects = data || []; 
                if (state.screen !== 'login' && state.screen !== 'client_login' && state.screen !== 'admin_login') {
                    render();
                }
            } catch (err) {
                console.error('Javascript Error:', err.message);
                showToast("Connection Error: " + err.message);
            }
        }

        fetchProjects();

        function setupDatabaseListener() {
            if (realtimeChannel) return; 
            fetchProjects();
            realtimeChannel = supabaseClientInstance.channel('public:projects')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, payload => {
                    fetchProjects(); 
                })
                .subscribe();
        }

        async function updateProjectData(updates) {
            if (state.role !== 'admin' || !state.activeProjectId) return;
            try {
                updates.updatedAt = Date.now();
                const { error } = await supabaseClientInstance
                    .from('projects')
                    .update(updates)
                    .eq('id', state.activeProjectId);

                if (error) throw error;
                showToast("Saved to cloud");
            } catch (e) { 
                console.error("Update failed", e);
                showToast("Update Failed");
            }
        }

        // --- HELPERS ---
        function getSyncStatus(project) {
            if (!project.timeline || project.timeline.length === 0) return "Just Started";
            const activeItem = project.timeline.find(t => t.state === 'active');
            if (activeItem) return activeItem.title;
            const allDone = project.timeline.every(t => t.state === 'done');
            if (allDone) return "Completed";
            return "Pending";
        }

        // --- NAVIGATION HANDLERS ---
        window.startClientLogin = () => { state.screen = 'client_login'; render(); };
        window.startAdminLogin = () => { state.screen = 'admin_login'; render(); };
        
        window.submitClientLogin = async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value;
            
            if (password !== '123') { showToast("Incorrect password."); return; }
            if (!username) return;

            const { data, error } = await supabaseClientInstance
                .from('projects')
                .select('clientUsername')
                .eq('clientUsername', username)
                .limit(1);

            if (error || !data || data.length === 0) {
                showToast("Client username not found! Please check your spelling.");
                return;
            }

            state.role = 'client';
            state.activeClientUsername = username;
            state.screen = 'campaigns_hub';
            setupDatabaseListener();
            render();
        };

        window.submitAdminLogin = (e) => {
            e.preventDefault();
            const username = document.getElementById('admin-username').value.trim().toLowerCase();
            const password = document.getElementById('admin-password').value;
            
            if (username === 'admin' && password === '123') {
                state.role = 'admin';
                state.screen = 'clients_hub';
                setupDatabaseListener();
                render();
            } else {
                showToast("Incorrect Admin Credentials."); 
            }
        };

        window.logout = () => {
            state.role = null;
            state.screen = 'login';
            state.activeClientUsername = null;
            state.activeCampaignName = null;
            state.activeProjectId = null;
            if (realtimeChannel) {
                supabaseClientInstance.removeChannel(realtimeChannel);
                realtimeChannel = null;
            }
            render();
        };

        window.openClient = (username) => { state.activeClientUsername = username; state.screen = 'campaigns_hub'; render(); };
        window.openCampaign = (campaignName) => { state.activeCampaignName = campaignName; state.screen = 'videos_hub'; render(); };
        window.openProject = (id) => { state.activeProjectId = parseInt(id); state.screen = 'dashboard'; render(); };

        window.goBack = () => {
            if (state.screen === 'client_login' || state.screen === 'admin_login') state.screen = 'login';
            else if (state.screen === 'dashboard') state.screen = 'videos_hub';
            else if (state.screen === 'videos_hub') state.screen = 'campaigns_hub';
            else if (state.screen === 'campaigns_hub') {
                if (state.role === 'admin') state.screen = 'clients_hub';
                else logout(); 
            }
            render();
        };

        // --- ADMIN PROJECT CREATION ---
        window.openCreateModal = () => {
            const modal = document.getElementById('create-modal');
            const content = document.getElementById('create-modal-content');
            document.getElementById('create-client').value = state.activeClientUsername || '';
            document.getElementById('create-campaign').value = state.activeCampaignName || '';
            document.getElementById('create-video').value = '';
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        window.closeCreateModal = () => {
            const modal = document.getElementById('create-modal');
            const content = document.getElementById('create-modal-content');
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); }, 200);
        };

        window.saveNewProject = async () => {
            const client = document.getElementById('create-client').value.trim();
            const campaign = document.getElementById('create-campaign').value.trim();
            const video = document.getElementById('create-video').value.trim();

            if (!client || !campaign || !video) { alert("Please fill all fields"); return; }

            const newProject = {
                clientUsername: client.toLowerCase(),
                campaignName: campaign,
                title: video,
                name: video,  
                statusTitle: "Scripting & Pre-prod",
                progress: 0,
                customMessage: "Project initialized. Let's make some magic!",
                deliverables: [],
                timeline: [
                    { title: "Scripting & Pre-prod", state: "active", timeStr: "Expected: TBD", rawDate: "" },
                    { title: "Video Shoot", state: "pending", timeStr: "Expected: TBD", rawDate: "" },
                    { title: "Rough Cut Edit", state: "pending", timeStr: "Expected: TBD", rawDate: "" },
                    { title: "Color Grading", state: "pending", timeStr: "Expected: TBD", rawDate: "" },
                    { title: "Delivery", state: "pending", timeStr: "Expected: TBD", rawDate: "" }
                ],
                updatedAt: Date.now()
            };

            try {
                const { error } = await supabaseClientInstance.from('projects').insert([newProject]);
                if (error) throw error;
                showToast("Project Created");
                closeCreateModal();
            } catch (e) { 
                console.error("Error creating project", e);
                showToast("Error creating project");
            }
        };

        // --- DELIVERABLES ---
        window.openDeliverableModal = () => {
            if (state.role !== 'admin') return;
            const modal = document.getElementById('deliverable-modal');
            const content = document.getElementById('deliverable-modal-content');
            document.getElementById('deliv-name').value = '';
            document.getElementById('deliv-url').value = '';
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        window.closeDeliverableModal = () => {
            const modal = document.getElementById('deliverable-modal');
            const content = document.getElementById('deliverable-modal-content');
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); }, 200);
        };

        window.saveDeliverable = async () => {
            const name = document.getElementById('deliv-name').value.trim();
            const url = document.getElementById('deliv-url').value.trim();

            if (!name || !url) { alert("Please enter both name and link."); return; }

            const project = state.projects.find(p => p.id === state.activeProjectId);
            const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

            const newDeliverable = {
                name: name,
                url: url,
                time: today,
                icon: "fa-link"
            };

            const updatedDeliverables = [newDeliverable, ...(project.deliverables || [])];
            updateProjectData({ deliverables: updatedDeliverables });
            closeDeliverableModal();
        };

        // --- ADMIN EDITING / RENAME / DELETE ---
        window.openModal = (title, currentValue, type, callback) => {
            if (state.role !== 'admin') return;
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            const input = document.getElementById('modal-input');
            const textarea = document.getElementById('modal-input-area');
            const titleEl = document.getElementById('modal-title');
            
            titleEl.innerText = title;
            isTextArea = (type === 'textarea');

            if (isTextArea) {
                input.classList.add('hidden');
                textarea.classList.remove('hidden');
                textarea.value = currentValue;
            } else {
                textarea.classList.add('hidden');
                input.classList.remove('hidden');
                input.type = type;
                input.value = currentValue;
            }

            modalCallback = callback;
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
                if(isTextArea) textarea.focus(); else input.focus();
            }, 10);
        };

        window.closeModal = () => {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); modalCallback = null; }, 200);
        };

        window.saveModal = () => {
            const inputEl = isTextArea ? document.getElementById('modal-input-area') : document.getElementById('modal-input');
            let val = inputEl.value;
            if (!isTextArea && document.getElementById('modal-input').type === 'number') val = parseInt(val) || 0;
            if (modalCallback) modalCallback(val);
            closeModal();
        };

        window.editCustomMessage = (current) => openModal('Message to Client', current, 'textarea', (val) => updateProjectData({ customMessage: val }));
        
        // Rename & Delete Actions
        window.renameClient = async (e, oldName) => {
            e.stopPropagation();
            openModal('Rename Client Username', oldName, 'text', async (newName) => {
                if(!newName || newName === oldName) return;
                try {
                    await supabaseClientInstance.from('projects').update({ clientUsername: newName.toLowerCase() }).eq('clientUsername', oldName);
                    showToast('Client renamed');
                } catch(err) { showToast('Error renaming'); }
            });
        };

        window.deleteClient = async (e, oldName) => {
            e.stopPropagation();
            if(confirm(`Are you sure you want to delete ALL projects for ${oldName}? This cannot be undone.`)) {
                try {
                    await supabaseClientInstance.from('projects').delete().eq('clientUsername', oldName);
                    showToast('Client deleted');
                } catch(err) { showToast('Error deleting'); }
            }
        };

        window.renameCampaign = async (e, oldName) => {
            e.stopPropagation();
            openModal('Rename Campaign', oldName, 'text', async (newName) => {
                if(!newName || newName === oldName) return;
                try {
                    await supabaseClientInstance.from('projects')
                        .update({ campaignName: newName })
                        .eq('clientUsername', state.activeClientUsername)
                        .eq('campaignName', oldName);
                    showToast('Campaign renamed');
                } catch(err) { showToast('Error renaming'); }
            });
        };

        window.deleteCampaign = async (e, oldName) => {
            e.stopPropagation();
            if(confirm(`Are you sure you want to delete campaign ${oldName} and all its videos?`)) {
                try {
                    await supabaseClientInstance.from('projects')
                        .delete()
                        .eq('clientUsername', state.activeClientUsername)
                        .eq('campaignName', oldName);
                    showToast('Campaign deleted');
                } catch(err) { showToast('Error deleting'); }
            }
        };

        window.renameVideo = async (e, id, oldName) => {
            e.stopPropagation();
            openModal('Rename Video Title', oldName, 'text', async (newName) => {
                if(!newName || newName === oldName) return;
                try {
                    await supabaseClientInstance.from('projects').update({ title: newName }).eq('id', id);
                    showToast('Video renamed');
                } catch(err) { showToast('Error renaming'); }
            });
        };

        window.deleteVideo = async (e, id) => {
            e.stopPropagation();
            if(confirm(`Are you sure you want to delete this video project?`)) {
                try {
                    await supabaseClientInstance.from('projects').delete().eq('id', id);
                    showToast('Video deleted');
                } catch(err) { showToast('Error deleting'); }
            }
        };

        // Deliverables Rename & Delete Actions
        window.renameDeliverable = async (e, index, oldName) => {
            e.preventDefault(); // Stop the link from opening
            e.stopPropagation();
            openModal('Rename Link', oldName, 'text', (newName) => {
                if (!newName || newName === oldName) return;
                const project = state.projects.find(p => p.id === state.activeProjectId);
                let newDeliverables = [...(project.deliverables || [])];
                newDeliverables[index].name = newName;
                updateProjectData({ deliverables: newDeliverables });
            });
        };

        window.deleteDeliverable = async (e, index) => {
            e.preventDefault(); // Stop the link from opening
            e.stopPropagation();
            if(confirm('Are you sure you want to delete this link?')) {
                const project = state.projects.find(p => p.id === state.activeProjectId);
                let newDeliverables = [...(project.deliverables || [])];
                newDeliverables.splice(index, 1);
                updateProjectData({ deliverables: newDeliverables });
            }
        };

        // Smart Date Picker with auto-calculate
        window.editTimelineDate = (index, currentRawVal) => {
            openModal('Set Timeline Date', currentRawVal || '', 'date', (newVal) => {
                if (!newVal) return; 
                
                const project = state.projects.find(p => p.id === state.activeProjectId);
                let newTimeline = [...project.timeline];
                
                // Parse exact local date from 'YYYY-MM-DD'
                let [y, m, d_day] = newVal.split('-');
                let d = new Date(y, m - 1, d_day);
                
                // Apply date to current and all following items (+1 day gap)
                for (let i = index; i < newTimeline.length; i++) {
                    const yyyy = d.getFullYear();
                    const mm = String(d.getMonth() + 1).padStart(2, '0');
                    const dd = String(d.getDate()).padStart(2, '0');
                    const raw = `${yyyy}-${mm}-${dd}`;
                    
                    const display = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                    
                    newTimeline[i].rawDate = raw;
                    newTimeline[i].timeStr = `Expected: ${display}`;
                    
                    // Add 1 day for next stage
                    d.setDate(d.getDate() + 1);
                }
                
                updateProjectData({ timeline: newTimeline });
            });
        };

        window.editTimelineState = (index, currentState) => {
            if(state.role !== 'admin') return;
            const nextState = currentState === 'pending' ? 'active' : (currentState === 'active' ? 'done' : 'pending');
            const project = state.projects.find(p => p.id === state.activeProjectId);
            let newTimeline = [...project.timeline];
            newTimeline[index].state = nextState;

            const totalTasks = newTimeline.length;
            const completedTasks = newTimeline.filter(t => t.state === 'done').length;
            const newProgress = totalTasks > 0 ? Math.round((completedTasks / totalTasks) * 100) : 0;

            updateProjectData({ timeline: newTimeline, progress: newProgress });
        };

                                                <span class="text-2xl font-bold">${project.progress}%</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Notes Section (Clean & Expanded) -->
                        <div class="bg-[#fff9f2] border border-orange-100 rounded-3xl p-6 card-shadow shrink-0 ${isAdmin ? 'cursor-pointer hover:border-orange-200 transition' : ''}"
                             ${isAdmin ? `onclick="editCustomMessage('${project.customMessage.replace(/'/g, "\\'")}')"` : ''}>
                            
                            <div class="flex items-center gap-3 mb-4">
                                <div class="w-10 h-10 rounded-full bg-orange-100 text-orange-500 flex items-center justify-center shrink-0">
                                    <i class="fa-solid fa-comment-dots text-lg"></i>
                                </div>
                                <h4 class="font-bold text-gray-900 text-lg flex-1">Note from Team</h4>
                                ${isAdmin ? '<div class="bg-white shadow-sm text-gray-500 p-2 rounded-full w-8 h-8 flex items-center justify-center transition hover:text-orange-500"><i class="fa-solid fa-pen text-xs"></i></div>' : ''}
                            </div>
                            
                            <p class="text-sm text-gray-600 mb-4 leading-relaxed">
                                Welcome to your workspace! ✨ We will keep you updated on everything happening right here.
                            </p>
                            
                            <div class="bg-white rounded-2xl p-4 shadow-sm border border-orange-50">
                                <span class="block text-[10px] uppercase tracking-wider text-orange-500 mb-1 font-bold">Latest Update</span>
                                <div class="text-sm text-gray-900 leading-relaxed font-semibold">
                                    ${project.customMessage}
                                </div>
                            </div>
                        </div>

                        <!-- Integrated Timeline -->
                        <div class="mt-4 shrink-0">
                            <h3 class="font-extrabold text-xl text-gray-900 mb-6 pl-1 flex items-center gap-2">
                                <i class="fa-solid fa-route text-orange-500"></i> Delivery Map
                            </h3>
                            <div class="relative pb-2">
                                <div class="absolute left-[10px] top-4 bottom-10 w-[4px] bg-gray-200 z-0 overflow-hidden rounded-full shadow-inner">
                                    <div class="w-full bg-black transition-all duration-1000 ease-in-out" style="height: ${Math.min(100, solidHeight)}%;"></div>
                                    <div class="w-full timeline-line-active transition-all duration-1000 ease-in-out" style="height: ${Math.min(100 - solidHeight, animatedHeight)}%;"></div>
                                </div>
                                ${timelineHtml}
                            </div>
                        </div>

                        <!-- Files & Links Section -->
                        <div class="bg-gray-50 rounded-3xl p-6 border border-gray-100 shrink-0">
                            <div class="flex justify-between items-center mb-5">
                                <div class="flex items-center gap-2">
                                    <div class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center text-gray-400 shrink-0">
                                        <i class="fa-regular fa-folder-open"></i>
                                    </div>
                                    <h3 class="font-extrabold text-gray-900 text-lg">Files & Links</h3>
                                </div>
                                ${isAdmin ? `
                                <button onclick="openDeliverableModal()" class="text-orange-500 text-xs font-bold bg-white px-4 py-2 rounded-xl shadow-sm hover:shadow transition border border-gray-100 shrink-0">
                                    <i class="fa-solid fa-plus mr-1"></i> Add Link
                                </button>
                                ` : ''}
                            </div>
                            <div class="space-y-3">
                                ${deliverablesHtml}
                            </div>
                        </div>

                        <!-- WhatsApp Help (Bottom) -->
                        <div class="bg-black rounded-3xl p-6 card-shadow text-center mb-6 shrink-0">
                            <div class="w-14 h-14 bg-gray-800 text-white rounded-full flex items-center justify-center mx-auto mb-3 text-2xl shadow-inner shrink-0">
                                <i class="fa-brands fa-whatsapp"></i>
                            </div>
                            <h3 class="font-bold text-white mb-1">Need help or changes?</h3>
                            <p class="text-xs text-gray-400 mb-4 px-4">Got questions? We are just a text away.</p>
                            <a href="${waLink}" target="_blank" class="inline-flex w-full justify-center items-center gap-2 bg-[#25D366] text-white font-bold py-4 rounded-xl shadow-md hover:bg-[#1ebe5d] transition-colors shrink-0">
                                <i class="fa-brands fa-whatsapp text-lg"></i> Chat on WhatsApp
                            </a>
                        </div>
                        
                    </div>
                </div>
            `;
        }

        // --- START APP ---
        render(); 
    </script>
</body>
</html>
